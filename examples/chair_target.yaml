output: models/chair_target
shape:
  type: voxel_cuboids
  voxel_size_mm: 24
  cuboids:
    - name: front_left_leg
      origin: [0, 0, 0]
      size: [1, 1, 2]
    - name: front_right_leg
      origin: [2, 0, 0]
      size: [1, 1, 2]
    - name: rear_left_leg
      origin: [0, 2, 0]
      size: [1, 1, 2]
    - name: rear_right_leg
      origin: [2, 2, 0]
      size: [1, 1, 2]
    - name: seat
      origin: [0, 0, 2]
      size: [3, 3, 1]
    - name: backrest
      origin: [0, 2, 3]
      size: [3, 1, 2]
dictionary: 4x4_100
markers:
  ids: 0-99
size:
  tag_size_mm: 18
layout:
  margin_cells: 1
  border_cells: 1
material:
  extruder: 1
  invert: false
